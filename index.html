<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <title>Drifter</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100vh;
        background: #0a0a12;
        /* Allow scrolling on small screens instead of cutting things off */
        overflow-y: auto; 
        overflow-x: hidden;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      /* Flex container to hold both the game and the sidecam */
      .arcade-setup {
        display: flex;
        flex-direction: row;
        align-items: flex-end; /* Aligns their bottoms together */
        gap: 32px;
        max-width: 100%;
        flex-wrap: wrap; /* Pushes cam below the game on small monitors */
        justify-content: center;
      }

      /* Main Game Cabinet */
      #cabinet {
        padding: 12px;
        background: #1a1a2e;
        border: 4px solid #f8f8f8;
        box-shadow:
          inset 0 0 0 4px #292952,
          0 0 0 4px #0a0a14,
          8px 8px 0 #0a0a14;
      }

      canvas {
        width: min(100vw - 48px, 600px);
        aspect-ratio: 3 / 4;
        display: block;
        background: #000;
      }

      /* New Sidecam Module Styling */
      #webcam-container {
        padding: 12px;
        background: #1a1a2e;
        border: 4px solid #7cffe1; /* Neon cyan border */
        box-shadow:
          inset 0 0 0 4px #292952,
          0 0 0 4px #0a0a14,
          8px 8px 0 #0a0a14;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      #webcam-preview {
        width: 240px; /* Standard 4:3 webcam ratio */
        height: 180px;
        background: #000;
        object-fit: cover;
        transform: scaleX(-1); /* Keep the mirror effect */
        display: block;
      }

      /* Little decorative label for the arcade feel */
      .cam-label {
        color: #7cffe1;
        font-family: 'Courier New', Courier, monospace;
        font-weight: bold;
        font-size: 16px;
        margin-top: 12px;
        letter-spacing: 1px;
        text-shadow: 0 0 8px rgba(124, 255, 225, 0.6);
      }
    </style>
    <script type="module" crossorigin src="/The-drifter/assets/index-D0ZgDaxT.js"></script>
  </head>
  <body>
    
    <div class="arcade-setup">
      <div id="cabinet">
        <canvas id="gameCanvas" width="600" height="800"></canvas>
      </div>
      
      <div id="webcam-container">
        <video id="webcam-preview" autoplay playsinline muted></video>
        <div class="cam-label">PLAYER CAM</div>
      </div>
    </div>
    
  </body>
</html>
